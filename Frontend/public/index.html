<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Login Logística</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet" href="login/css/login.css">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-header text-center">
                    Sistema Logístico
                </div>

                <div class="card-body">

                    <form id="loginForm">

                        <div class="mb-3">

                            <label class="form-label">
                                Usuario
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                id="username">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Contraseña
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                id="password">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Rol
                            </label>

                            <select
                                class="form-select"
                                id="role">

                                <option value="operario">
                                    Operario
                                </option>

                            </select>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Ingresar

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="login/js/login.js"></script>

</body>
</html>
