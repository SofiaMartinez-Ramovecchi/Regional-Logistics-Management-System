services:

  frontend:

    image: nginx:alpine

    container_name: logistics-frontend

    ports:
      - "3000:80"

    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro   
    depends_on:
      - backend

    restart: unless-stopped

  backend:

    build:
      context: ./Backend

    container_name: logistics-backend

    ports:
      - "8080:8080"

    restart: unless-stopped
