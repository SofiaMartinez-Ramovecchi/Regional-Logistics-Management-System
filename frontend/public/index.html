<!DOCTYPE html>
<html lang="es">

  <head>

    <meta charset="UTF-8">

    <title>Login Logística</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet">

    <link rel="stylesheet" href="login/css/login.css">

  </head>

  <script class="bg-light">
  </script>

  <body>
    <div class="container">

      <div class="row justify-content-center mt-5">

        <div class="col-md-4">

          <div class="card shadow">

            <div class="card-header text-center">
              Sistema Logístico
            </div>

            <div class="card-body">

              <form class="form-control" id="login-form">

                <input
                  class="form-control"
                  type="email"
                  id="email"
                  placeholder="Email"
                >

                <input
                  class="form-control"
                  type="password"
                  id="password"
                  placeholder="Contraseña"
                >

                <button class="btn btn-primary" type="submit">
                  Ingresar
                </button>

              </form>

            </div>

          </div>

        </div>

      </div>

    </div>
   <script type="module" src="login/js/login.js"></script>
  </body>

</html>
