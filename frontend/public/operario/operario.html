<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Panel Operario</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="css/operario.css">

</head>

<body class="bg-light">

<div class="container mt-4">

    <h1 class="mb-4">

        Panel Operario

    </h1>

    <div class="card shadow-sm">

        <div class="card-header">
            Remitos de despacho
        </div>

        <div class="card-body">

            <table class="table table-striped">

                <thead>

                <tr>
                    <th>Remito</th>
                    <th>Sucursal</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>

                </thead>

                <tbody id="ordersTable">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script type="module" src="js/operario.js"></script>

</body>
</html>
